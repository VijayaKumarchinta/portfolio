<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="630" fill="#0a0a0f"/>
  <!-- Gradient Orbs -->
  <ellipse cx="300" cy="315" rx="400" ry="400" fill="url(#blue)" opacity="0.25"/>
  <ellipse cx="900" cy="315" rx="350" ry="350" fill="url(#purple)" opacity="0.2"/>
  <ellipse cx="600" cy="630" rx="300" ry="200" fill="url(#pink)" opacity="0.15"/>
  <!-- Grid lines -->
  <line x1="0" y1="210" x2="1200" y2="210" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="400" y1="0" x2="400" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="800" y1="0" x2="800" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <!-- Content -->
  <text x="80" y="260" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="500" fill="rgba(255,255,255,0.5)">Chinta</text>
  <text x="80" y="320" font-family="system-ui, -apple-system, sans-serif" font-size="64" font-weight="800" fill="url(#gradient-text)">Vijaya Kumar</text>
  <text x="80" y="380" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="400" fill="rgba(255,255,255,0.4)">Data Analyst &amp; BI Analyst</text>
  <!-- Tags -->
  <rect x="80" y="420" width="100" height="32" rx="16" fill="rgba(255,255,255,0.06)"/>
  <text x="130" y="441" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="rgba(255,255,255,0.5)" text-anchor="middle">Python</text>
  <rect x="190" y="420" width="80" height="32" rx="16" fill="rgba(255,255,255,0.06)"/>
  <text x="230" y="441" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="rgba(255,255,255,0.5)" text-anchor="middle">SQL</text>
  <rect x="280" y="420" width="110" height="32" rx="16" fill="rgba(255,255,255,0.06)"/>
  <text x="335" y="441" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="rgba(255,255,255,0.5)" text-anchor="middle">Power BI</text>
  <rect x="400" y="420" width="105" height="32" rx="16" fill="rgba(255,255,255,0.06)"/>
  <text x="452" y="441" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="rgba(255,255,255,0.5)" text-anchor="middle">Tableau</text>
  <rect x="515" y="420" width="130" height="32" rx="16" fill="rgba(255,255,255,0.06)"/>
  <text x="580" y="441" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="rgba(255,255,255,0.5)" text-anchor="middle">Dashboards</text>
  <defs>
    <radialGradient id="blue" cx="50%" cy="50%" r="50%">
      <stop stop-color="#3b82f6" stop-opacity="1"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="purple" cx="50%" cy="50%" r="50%">
      <stop stop-color="#a855f7" stop-opacity="1"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="pink" cx="50%" cy="50%" r="50%">
      <stop stop-color="#ec4899" stop-opacity="1"/>
      <stop offset="100%" stop-color="#ec4899" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gradient-text" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop stop-color="#60a5fa"/>
      <stop offset="50%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#f472b6"/>
    </linearGradient>
  </defs>
